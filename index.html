<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 效果演示 - 旋转加载器 & 涟漪按钮</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(240, 147, 251, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.1) 0%, transparent 60%);
    animation: bgFloat 20s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(2%, -2%) rotate(1deg); }
    66% { transform: translate(-2%, 2%) rotate(-1deg); }
  }

  .floating-shapes {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.4;
    filter: blur(60px);
    animation: floatShape 15s ease-in-out infinite;
  }

  .shape-1 {
    width: 300px;
    height: 300px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    top: 5%;
    left: 5%;
    animation-delay: 0s;
  }

  .shape-2 {
    width: 250px;
    height: 250px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    bottom: 10%;
    right: 8%;
    animation-delay: -5s;
  }

  .shape-3 {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    top: 50%;
    right: 15%;
    animation-delay: -10s;
  }

  @keyframes floatShape {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -30px) scale(1.1); }
  }

  .container {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    box-shadow:
      0 25px 80px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    padding: 70px 60px;
    max-width: 1100px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 70px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #f093fb, #4facfe);
    border-radius: 2px;
    margin: 24px auto 0;
  }

  .badge {
    display: inline-block;
    padding: 6px 18px;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(240, 147, 251, 0.3));
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50px;
    color: #c4c8ff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .page-title {
    color: #ffffff;
    font-size: 44px;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ffffff 0%, #c4c8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .page-subtitle {
    color: rgba(255, 255, 255, 0.6);
    font-size: 17px;
    line-height: 1.7;
    max-width: 560px;
    margin: 0 auto;
  }

  .section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  .demo-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 45px 35px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
  }

  .demo-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--card-accent), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .demo-card:hover {
    transform: translateY(-8px);
    border-color: rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.06);
  }

  .demo-card:hover::before {
    opacity: 1;
  }

  .demo-card.loader-card {
    --card-accent: #667eea;
  }

  .demo-card.ripple-card {
    --card-accent: #f093fb;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
    width: 100%;
  }

  .demo-icon {
    width: 54px;
    height: 54px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
  }

  .demo-card.loader-card .demo-icon {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }

  .demo-card.ripple-card .demo-icon {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  }

  .card-titles {
    flex: 1;
  }

  .demo-title {
    font-size: 22px;
    color: #ffffff;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .demo-tag {
    display: inline-block;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.06);
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .demo-desc {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.55);
    text-align: left;
    margin-bottom: 35px;
    line-height: 1.7;
    width: 100%;
  }

  .demo-area {
    width: 100%;
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.25);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 30px;
    position: relative;
    overflow: hidden;
  }

  .demo-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }

  .loader-variants {
    display: flex;
    gap: 50px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .loader-variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .loader,
  .loader-2,
  .loader-3 {
    width: 64px;
    height: 64px;
    border-radius: 50%;
  }

  .loader {
    border: 5px solid rgba(255, 255, 255, 0.1);
    border-top-color: #667eea;
    border-right-color: #764ba2;
    animation: spin 1s linear infinite;
  }

  .loader-2 {
    border: 5px solid transparent;
    border-top-color: #f093fb;
    border-bottom-color: #f5576c;
    border-left-color: #f5576c;
    animation: spin 0.8s ease-in-out infinite;
  }

  .loader-3 {
    position: relative;
  }

  .loader-3::before,
  .loader-3::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 5px solid transparent;
  }

  .loader-3::before {
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-top-color: #4facfe;
    animation: spin 1s linear infinite;
  }

  .loader-3::after {
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border-bottom-color: #00f2fe;
    animation: spin 0.6s linear infinite reverse;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loader-text {
    color: rgba(255, 255, 255, 0.65);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .btn-variants {
    display: flex;
    flex-direction: column;
    gap: 22px;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .ripple-btn {
    position: relative;
    padding: 18px 56px;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    outline: none;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
    letter-spacing: 0.5px;
    overflow: visible;
    min-width: 220px;
  }

  .ripple-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    padding: 1.5px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .ripple-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 30px rgba(245, 87, 108, 0.5);
  }

  .ripple-btn:active {
    transform: translateY(0) scale(0.98);
  }

  .ripple-btn.blue {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
  }

  .ripple-btn.blue:hover {
    box-shadow: 0 10px 30px rgba(0, 242, 254, 0.5);
  }

  .ripple-btn.green {
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    box-shadow: 0 6px 20px rgba(56, 249, 215, 0.4);
  }

  .ripple-btn.green:hover {
    box-shadow: 0 10px 30px rgba(56, 249, 215, 0.5);
  }

  .ripple-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  .water-canvas {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple-effect 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  @keyframes ripple-effect {
    0% {
      transform: scale(0);
      opacity: 0.8;
    }
    100% {
      transform: scale(30);
      opacity: 0;
    }
  }

  .footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 30px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .footer-text {
    color: rgba(255, 255, 255, 0.35);
    font-size: 13px;
    letter-spacing: 0.3px;
  }

  .footer-text span {
    background: linear-gradient(90deg, #667eea, #f093fb, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }

  @media (max-width: 768px) {
    .container {
      padding: 45px 25px;
    }
    .page-title {
      font-size: 30px;
    }
    .section {
      grid-template-columns: 1fr;
      gap: 30px;
    }
    .loader-variants {
      gap: 30px;
    }
    .ripple-btn {
      min-width: 180px;
      padding: 16px 40px;
    }
  }
</style>
</head>
<body>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="ripple-container" id="rippleContainer"></div>
  <canvas class="water-canvas" id="waterCanvas"></canvas>

  <div class="container">
    <div class="header">
      <span class="badge">✨ Pure CSS Magic</span>
      <h1 class="page-title">CSS 动画效果展示</h1>
      <p class="page-subtitle">探索纯 CSS 与少量 JavaScript 创造的精美交互效果，旋转加载器与全屏涟漪扩散按钮</p>
    </div>

    <div class="section">
      <div class="demo-card loader-card">
        <div class="card-header">
          <div class="demo-icon">⏳</div>
          <div class="card-titles">
            <h2 class="demo-title">旋转加载器</h2>
            <span class="demo-tag">CSS @keyframes</span>
          </div>
        </div>
        <p class="demo-desc">通过 CSS 关键帧动画实现流畅的旋转加载效果，适用于数据请求、页面加载等等待场景。提供三种不同风格的设计。</p>
        <div class="demo-area">
          <div class="loader-variants">
            <div class="loader-variant">
              <div class="loader"></div>
              <span class="loader-text">基础款</span>
            </div>
            <div class="loader-variant">
              <div class="loader-2"></div>
              <span class="loader-text">双色款</span>
            </div>
            <div class="loader-variant">
              <div class="loader-3"></div>
              <span class="loader-text">双环款</span>
            </div>
          </div>
        </div>
      </div>

      <div class="demo-card ripple-card">
        <div class="card-header">
          <div class="demo-icon">✨</div>
          <div class="card-titles">
            <h2 class="demo-title">涟漪按钮</h2>
            <span class="demo-tag">JS + CSS Animation</span>
          </div>
        </div>
        <p class="demo-desc">点击按钮时，从按钮中心位置向外扩散出全屏范围的圆形波纹，配合渐变色彩营造沉浸式交互体验。</p>
        <div class="demo-area">
          <div class="btn-variants">
            <button class="ripple-btn">点击我 💕</button>
            <button class="ripple-btn blue">蓝色按钮 🌊</button>
            <button class="ripple-btn green">绿色按钮 🌿</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p class="footer-text">Crafted with <span>♥ CSS & JavaScript</span> — 刷新页面重新体验</p>
    </div>
  </div>

<script>
  const rippleContainer = document.getElementById('rippleContainer');

  const colorMap = {
    default: ['rgba(240, 147, 251, 0.5)', 'rgba(245, 87, 108, 0.3)'],
    blue: ['rgba(79, 172, 254, 0.5)', 'rgba(0, 242, 254, 0.3)'],
    green: ['rgba(67, 233, 123, 0.5)', 'rgba(56, 249, 215, 0.3)']
  };

  document.querySelectorAll('.ripple-btn').forEach(button => {
    button.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      let colors = colorMap.default;
      if (this.classList.contains('blue')) colors = colorMap.blue;
      if (this.classList.contains('green')) colors = colorMap.green;

      for (let i = 0; i < 2; i++) {
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const size = 60;
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.left = (centerX - size / 2) + 'px';
        ripple.style.top = (centerY - size / 2) + 'px';
        ripple.style.background = `radial-gradient(circle, ${colors[0]} 0%, ${colors[1]} 50%, transparent 70%)`;
        ripple.style.animationDelay = (i * 0.15) + 's';
        rippleContainer.appendChild(ripple);
        setTimeout(() => ripple.remove(), 1600);
      }
    });
  });
</script>

<script>
(function() {
  const canvas = document.getElementById('waterCanvas');
  const ctx = canvas.getContext('2d');

  let width, height;
  let cols, rows;
  const cellSize = 4;
  const damping = 0.97;

  let current, previous;

  function initBuffers() {
    cols = Math.ceil(width / cellSize);
    rows = Math.ceil(height / cellSize);
    const size = cols * rows;
    current = new Float32Array(size);
    previous = new Float32Array(size);
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initBuffers();
  }

  function addDrop(x, y, strength, radius) {
    const gx = Math.floor(x / cellSize);
    const gy = Math.floor(y / cellSize);
    const r = Math.ceil(radius / cellSize);
    const rSq = r * r;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const px = gx + dx;
        const py = gy + dy;
        if (px < 0 || px >= cols || py < 0 || py >= rows) continue;
        const distSq = dx * dx + dy * dy;
        if (distSq <= rSq) {
          const dist = Math.sqrt(distSq);
          const factor = 1 - dist / r;
          const val = strength * factor * factor;
          current[py * cols + px] -= val;
        }
      }
    }
  }

  function updateWater() {
    for (let y = 1; y < rows - 1; y++) {
      const yOff = y * cols;
      for (let x = 1; x < cols - 1; x++) {
        const idx = yOff + x;
        const neighbors =
          current[idx - 1] +
          current[idx + 1] +
          current[idx - cols] +
          current[idx + cols];
        previous[idx] = (neighbors * 0.5 - previous[idx]) * damping;
      }
    }

    const temp = current;
    current = previous;
    previous = temp;

    const edgeSize = Math.max(2, Math.min(8, Math.floor(cols * 0.03), Math.floor(rows * 0.03)));
    const edgeDampStart = 0.92;
    const edgeDampEnd = 0.5;

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < edgeSize; x++) {
        const t = x / edgeSize;
        const d = edgeDampStart + (edgeDampEnd - edgeDampStart) * t;
        current[y * cols + x] *= d;
        current[y * cols + (cols - 1 - x)] *= d;
      }
    }
    for (let x = 0; x < cols; x++) {
      for (let y = 0; y < edgeSize; y++) {
        const t = y / edgeSize;
        const d = edgeDampStart + (edgeDampEnd - edgeDampStart) * t;
        current[y * cols + x] *= d;
        current[(rows - 1 - y) * cols + x] *= d;
      }
    }
  }

  function renderWater() {
    ctx.clearRect(0, 0, width, height);

    const waterGradient = ctx.createLinearGradient(0, 0, 0, height);
    waterGradient.addColorStop(0, 'rgba(79, 172, 254, 0.02)');
    waterGradient.addColorStop(0.3, 'rgba(79, 172, 254, 0.05)');
    waterGradient.addColorStop(0.5, 'rgba(102, 126, 234, 0.1)');
    waterGradient.addColorStop(0.75, 'rgba(102, 126, 234, 0.18)');
    waterGradient.addColorStop(1, 'rgba(118, 75, 162, 0.28)');
    ctx.fillStyle = waterGradient;
    ctx.fillRect(0, 0, width, height);

    const imgData = ctx.getImageData(0, 0, width, height);
    const data = imgData.data;

    const lx = -0.4, ly = -0.6, lz = 0.7;
    const llen = Math.sqrt(lx * lx + ly * ly + lz * lz);
    const nlx = lx / llen, nly = ly / llen, nlz = lz / llen;

    const amplitude = 5;

    for (let y = 0; y < rows; y++) {
      const yOff = y * cellSize;
      const t = yOff / height;

      const yIdx = y * cols;

      for (let x = 0; x < cols; x++) {
        const idx = yIdx + x;
        const h = current[idx] * amplitude;
        const hAbs = Math.abs(h);

        if (hAbs < 0.03 && t < 0.2) continue;

        let nx = 0, ny = 0;
        if (x > 0 && x < cols - 1 && y > 0 && y < rows - 1) {
          nx = (current[idx - 1] - current[idx + 1]) * amplitude;
          ny = (current[idx - cols] - current[idx + cols]) * amplitude;
        }
        const nz = 3;
        const nlen = Math.sqrt(nx * nx + ny * ny + nz * nz);
        const nnx = nx / nlen, nny = ny / nlen, nnz = nz / nlen;

        let diffuse = nnx * nlx + nny * nly + nnz * nlz;
        if (diffuse < 0.2) diffuse = 0.2;

        let spec = 0;
        const hx = nlx, hy = nly, hz = nlz + 1;
        const hlen = Math.sqrt(hx * hx + hy * hy + hz * hz);
        if (hlen > 0) {
          spec = nnx * (hx / hlen) + nny * (hy / hlen) + nnz * (hz / hlen);
          if (spec < 0) spec = 0;
          spec = Math.pow(spec, 28) * 0.8;
        }

        const xOff = x * cellSize;
        const alphaFactor = 0.3 + t * 1.2;
        const baseR = 79 + (118 - 79) * t;
        const baseG = 172 + (75 - 172) * t;
        const baseB = 254 + (162 - 254) * t;

        const r = Math.min(255, Math.floor(baseR * diffuse + spec * 255));
        const g = Math.min(255, Math.floor(baseG * diffuse + spec * 255));
        const b = Math.min(255, Math.floor(baseB * diffuse + spec * 255));
        const a = Math.min(255, Math.floor(hAbs * alphaFactor * 20 + spec * 200));

        if (a <= 2) continue;

        for (let sy = 0; sy < cellSize && yOff + sy < height; sy++) {
          for (let sx = 0; sx < cellSize && xOff + sx < width; sx++) {
            const pIdx = ((yOff + sy) * width + (xOff + sx)) * 4;
            const ea = data[pIdx + 3] / 255;
            const na = a / 255;
            const ta = na + ea * (1 - na);
            if (ta > 0 && na > 0) {
              data[pIdx] = Math.floor((r * na + data[pIdx] * ea * (1 - na)) / ta);
              data[pIdx + 1] = Math.floor((g * na + data[pIdx + 1] * ea * (1 - na)) / ta);
              data[pIdx + 2] = Math.floor((b * na + data[pIdx + 2] * ea * (1 - na)) / ta);
              data[pIdx + 3] = Math.floor(ta * 255);
            }
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);

    ctx.globalCompositeOperation = 'screen';
    const hg1 = ctx.createRadialGradient(width * 0.2, height * 0.5, 0, width * 0.2, height * 0.5, width * 0.6);
    hg1.addColorStop(0, 'rgba(0, 242, 254, 0.06)');
    hg1.addColorStop(1, 'rgba(0, 242, 254, 0)');
    ctx.fillStyle = hg1;
    ctx.fillRect(0, 0, width, height);

    const hg2 = ctx.createRadialGradient(width * 0.8, height * 0.75, 0, width * 0.8, height * 0.75, width * 0.5);
    hg2.addColorStop(0, 'rgba(240, 147, 251, 0.04)');
    hg2.addColorStop(1, 'rgba(240, 147, 251, 0)');
    ctx.fillStyle = hg2;
    ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'source-over';
  }

  function animate() {
    updateWater();
    renderWater();
    requestAnimationFrame(animate);
  }

  let lastMouseX = -1, lastMouseY = -1;
  let lastMoveTime = 0;
  const moveThrottle = 16;

  function handleMouseMove(e) {
    const now = performance.now();
    if (now - lastMoveTime < moveThrottle) return;
    lastMoveTime = now;

    const x = e.clientX;
    const y = e.clientY;

    if (lastMouseX < 0) {
      lastMouseX = x;
      lastMouseY = y;
      return;
    }

    const dx = x - lastMouseX;
    const dy = y - lastMouseY;
    const speed = Math.sqrt(dx * dx + dy * dy);

    if (speed > 2) {
      const steps = Math.min(8, Math.ceil(speed / 4));
      for (let i = 0; i <= steps; i++) {
        const tt = i / steps;
        const ix = lastMouseX + dx * tt;
        const iy = lastMouseY + dy * tt;
        const strength = Math.min(20, 5 + speed * 0.12);
        const radius = Math.min(40, 15 + speed * 0.2);
        addDrop(ix, iy, strength, radius);
      }
    }

    lastMouseX = x;
    lastMouseY = y;
  }

  function handleClick(e) {
    addDrop(e.clientX, e.clientY, 30, 50);
    setTimeout(function() { addDrop(e.clientX, e.clientY, 18, 35); }, 70);
    setTimeout(function() { addDrop(e.clientX, e.clientY, 8, 20); }, 150);
  }

  function handleTouchMove(e) {
    if (e.touches.length > 0) {
      const touch = e.touches[0];
      handleMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
    }
  }

  function handleTouchStart(e) {
    if (e.touches.length > 0) {
      const touch = e.touches[0];
      lastMouseX = -1;
      lastMouseY = -1;
      handleClick({ clientX: touch.clientX, clientY: touch.clientY });
    }
  }

  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', handleMouseMove);
  document.addEventListener('click', handleClick);
  document.addEventListener('touchmove', handleTouchMove, { passive: true });
  document.addEventListener('touchstart', handleTouchStart, { passive: true });

  resize();
  animate();

  setTimeout(function() {
    addDrop(width * 0.2, height * 0.2, 22, 45);
    setTimeout(function() { addDrop(width * 0.6, height * 0.35, 20, 40); }, 150);
    setTimeout(function() { addDrop(width * 0.4, height * 0.55, 18, 38); }, 300);
    setTimeout(function() { addDrop(width * 0.75, height * 0.8, 16, 35); }, 450);
    setTimeout(function() { addDrop(width * 0.15, height * 0.75, 15, 32); }, 600);
  }, 600);
})();
</script>
</body>
