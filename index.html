<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 效果演示 - 旋转加载器 & 涟漪按钮</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    padding: 60px 50px;
    max-width: 900px;
    width: 100%;
  }

  .page-title {
    text-align: center;
    color: #333;
    font-size: 32px;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .page-subtitle {
    text-align: center;
    color: #888;
    font-size: 16px;
    margin-bottom: 60px;
  }

  .section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
  }

  .demo-card {
    background: #f8f9fa;
    border-radius: 16px;
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.3s ease;
  }

  .demo-card:hover {
    transform: translateY(-5px);
  }

  .demo-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 20px;
    color: #fff;
  }

  .demo-card:nth-child(1) .demo-icon {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }

  .demo-card:nth-child(2) .demo-icon {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  }

  .demo-title {
    font-size: 22px;
    color: #333;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .demo-desc {
    font-size: 14px;
    color: #888;
    text-align: center;
    margin-bottom: 35px;
    line-height: 1.6;
  }

  .demo-area {
    width: 100%;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border-radius: 12px;
    border: 2px dashed #e0e0e0;
  }

  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  .loader {
    width: 70px;
    height: 70px;
    border: 5px solid #e5e7eb;
    border-top-color: #667eea;
    border-right-color: #764ba2;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .loader-text {
    color: #888;
    font-size: 14px;
    font-weight: 500;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loader-variants {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .loader-variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }

  .loader-2 {
    width: 50px;
    height: 50px;
    border: 4px solid transparent;
    border-top-color: #f093fb;
    border-bottom-color: #f5576c;
    border-left-color: #f5576c;
    border-radius: 50%;
    animation: spin 0.8s ease-in-out infinite;
  }

  .loader-3 {
    width: 50px;
    height: 50px;
    position: relative;
  }

  .loader-3::before,
  .loader-3::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 4px solid transparent;
  }

  .loader-3::before {
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-top-color: #667eea;
    animation: spin 1s linear infinite;
  }

  .loader-3::after {
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
    border-bottom-color: #764ba2;
    animation: spin 0.6s linear infinite reverse;
  }

  .ripple-btn {
    position: relative;
    padding: 18px 50px;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    outline: none;
    transition: transform 0.15s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
    letter-spacing: 0.5px;
  }

  .ripple-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(245, 87, 108, 0.5);
  }

  .ripple-btn:active {
    transform: translateY(0);
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    transform: scale(0);
    animation: ripple-effect 0.7s ease-out;
    pointer-events: none;
  }

  @keyframes ripple-effect {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  .btn-variants {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }

  .ripple-btn.blue {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
  }

  .ripple-btn.blue:hover {
    box-shadow: 0 6px 25px rgba(0, 242, 254, 0.5);
  }

  .ripple-btn.green {
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    box-shadow: 0 4px 15px rgba(56, 249, 215, 0.4);
  }

  .ripple-btn.green:hover {
    box-shadow: 0 6px 25px rgba(56, 249, 215, 0.5);
  }

  @media (max-width: 768px) {
    .container {
      padding: 40px 25px;
    }
    .section {
      grid-template-columns: 1fr;
      gap: 40px;
    }
    .page-title {
      font-size: 26px;
    }
    .loader-variants {
      gap: 25px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <h1 class="page-title">CSS 效果演示</h1>
    <p class="page-subtitle">旋转加载器 & 涟漪扩散按钮 · 纯 CSS 实现</p>

    <div class="section">
      <div class="demo-card">
        <div class="demo-icon">⏳</div>
        <h2 class="demo-title">旋转加载器</h2>
        <p class="demo-desc">利用 CSS @keyframes 实现多种旋转动画效果，常用于数据加载等待场景。</p>
        <div class="demo-area">
          <div class="loader-variants">
            <div class="loader-variant">
              <div class="loader"></div>
              <span class="loader-text">基础款</span>
            </div>
            <div class="loader-variant">
              <div class="loader-2"></div>
              <span class="loader-text">双色款</span>
            </div>
            <div class="loader-variant">
              <div class="loader-3"></div>
              <span class="loader-text">双环款</span>
            </div>
          </div>
        </div>
      </div>

      <div class="demo-card">
        <div class="demo-icon">✨</div>
        <h2 class="demo-title">涟漪按钮</h2>
        <p class="demo-desc">点击按钮时从中心向外扩散出圆形波纹，配合 JS 动态生成涟漪元素。</p>
        <div class="demo-area">
          <div class="btn-variants">
            <button class="ripple-btn">点击我 💕</button>
            <button class="ripple-btn blue">蓝色按钮 🌊</button>
            <button class="ripple-btn green">绿色按钮 🌿</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  document.querySelectorAll('.ripple-btn').forEach(button => {
    button.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (rect.width / 2 - size / 2) + 'px';
      ripple.style.top = (rect.height / 2 - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);
    });
  });
</script>
</body>
</html>
